name: Update HES Pages Data

on:
  workflow_dispatch:
  schedule:
    # Run every 5 minutes (GitHub minimum), and gate by KST window in-job.
    - cron: "*/5 * * * *"
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: update-hes-pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Decide whether this run should update
        id: gate
        run: |
          python - <<'PY'
          import os
          from datetime import datetime, timezone

          event_name = os.getenv("GITHUB_EVENT_NAME", "")
          should_run = True
          reason = "non-scheduled event"

          if event_name == "schedule":
              now_utc = datetime.now(timezone.utc)
              hour_utc = now_utc.hour
              in_window = 1 <= hour_utc <= 14
              should_run = in_window
              reason = (
                  f"in UTC active window {now_utc.strftime('%H:%M')}"
                  if in_window
                  else f"outside UTC active window {now_utc.strftime('%H:%M')}"
              )

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"should_run={'true' if should_run else 'false'}\n")
              f.write(f"reason={reason}\n")
          PY

      - name: Skip outside target window
        if: steps.gate.outputs.should_run != 'true'
        run: |
          echo "Skipping scheduled update: ${{ steps.gate.outputs.reason }}"
          exit 0

      - name: Build static page
        if: steps.gate.outputs.should_run == 'true'
        run: python build_static_site.py

      - name: Commit and push if changed
        if: steps.gate.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html thumbnail.png game-data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: refresh next Hanwha game preview"
            git push
          fi

      - name: Queue next refresh run
        if: steps.gate.outputs.should_run == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python - <<'PY'
          import os
          from datetime import datetime, timezone

          now_utc = datetime.now(timezone.utc)
          hour_utc = now_utc.hour

          # Continue chaining only in active UTC window (KST 10:00~23:59).
          if not (1 <= hour_utc <= 14):
              with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
                  f.write("CHAIN_NEXT=false\n")
              raise SystemExit(0)

          sec_to_next_5 = ((5 - (now_utc.minute % 5)) % 5) * 60 - now_utc.second
          if sec_to_next_5 <= 0:
              sec_to_next_5 += 300

          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as f:
              f.write("CHAIN_NEXT=true\n")
              f.write(f"SLEEP_SECONDS={sec_to_next_5}\n")
          PY

          if [ "$CHAIN_NEXT" != "true" ]; then
            echo "Skip chaining: outside active KST window"
            exit 0
          fi

          echo "Sleeping ${SLEEP_SECONDS}s before next dispatch"
          sleep "${SLEEP_SECONDS}"
          gh workflow run "${GITHUB_WORKFLOW}" --ref "${GITHUB_REF_NAME}"
