name: Update HES Pages Data

on:
  workflow_dispatch:
  schedule:
    # Run every 5 minutes (GitHub minimum), and gate by KST window in-job.
    - cron: "*/5 * * * *"
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: update-hes-pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Decide whether this run should update
        id: gate
        run: |
          python - <<'PY'
          import os
          from datetime import datetime, timedelta, timezone

          event_name = os.getenv("GITHUB_EVENT_NAME", "")
          should_run = True
          reason = "non-scheduled event"

          if event_name == "schedule":
              kst = timezone(timedelta(hours=9))
              now_kst = datetime.now(timezone.utc).astimezone(kst)
              hour = now_kst.hour
              minute = now_kst.minute
              in_window = 10 <= hour <= 23
              should_run = in_window
              reason = (
                  f"in KST window {now_kst.strftime('%H:%M')}"
                  if in_window
                  else f"outside KST window {now_kst.strftime('%H:%M')}"
              )

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"should_run={'true' if should_run else 'false'}\n")
              f.write(f"reason={reason}\n")
          PY

      - name: Skip outside target window
        if: steps.gate.outputs.should_run != 'true'
        run: |
          echo "Skipping scheduled update: ${{ steps.gate.outputs.reason }}"
          exit 0

      - name: Build static page
        if: steps.gate.outputs.should_run == 'true'
        run: python build_static_site.py

      - name: Commit and push if changed
        if: steps.gate.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html thumbnail.png game-data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: refresh next Hanwha game preview"
            git push
          fi
