name: Update HES Pages Data

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions schedule supports a minimum 5-minute interval.
    # KST 10:00~23:59 (UTC 01:00~14:59): every 5 minutes.
    - cron: "*/5 1-14 * * *"
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: update-hes-pages-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build static page
        run: python build_static_site.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html thumbnail.png game-data.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: refresh next Hanwha game preview"
            git push
          fi
