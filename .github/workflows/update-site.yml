name: Update HES Pages Data

on:
  workflow_dispatch:
  schedule:
    # Regular refresh to keep preview data up to date.
    - cron: "0 */6 * * *"
    # Live sync window (KST): every minute from 18:30 through 01:59 next day.
    # UTC mapping: 09:30-09:59 and 10:00-16:59.
    - cron: "30-59 9 * * *"
    - cron: "* 10-16 * * *"
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Decide whether this run should update
        id: gate
        run: |
          python - <<'PY'
          import os
          from datetime import datetime, time
          from zoneinfo import ZoneInfo
          from crawler import get_next_hanwha_game

          event_name = os.getenv("GITHUB_EVENT_NAME", "")
          now_kst = datetime.now(ZoneInfo("Asia/Seoul"))
          game_info = get_next_hanwha_game() or {}
          live = game_info.get("live_status", {}) if game_info else {}
          game_date = game_info.get("game_date_ymd", "")
          is_today_game = game_date == now_kst.strftime("%Y-%m-%d")
          in_live_window = now_kst.time() >= time(18, 30) or now_kst.time() <= time(1, 59)
          is_live = bool(live.get("is_live"))
          is_final = bool(live.get("is_final"))

          should_run = True
          reason = "non-scheduled event"

          if event_name == "schedule":
              # Scheduled runs should update if:
              # 1) today's game is in/after live window, or
              # 2) game is currently live, or
              # 3) game just finished (one more refresh to switch to next game).
              should_run = (
                  (is_today_game and in_live_window)
                  or is_live
                  or is_final
              )
              reason = (
                  f"today_game={is_today_game}, in_live_window={in_live_window}, "
                  f"is_live={is_live}, is_final={is_final}"
              )

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"should_run={'true' if should_run else 'false'}\n")
              f.write(f"reason={reason}\n")
          PY

      - name: Skip outside target window
        if: steps.gate.outputs.should_run != 'true'
        run: |
          echo "Skipping scheduled update: ${{ steps.gate.outputs.reason }}"
          exit 0

      - name: Build static page
        if: steps.gate.outputs.should_run == 'true'
        run: python build_static_site.py

      - name: Commit and push if changed
        if: steps.gate.outputs.should_run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html thumbnail.png
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: refresh next Hanwha game preview"
            git push
          fi
