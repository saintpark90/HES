<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ og.title if og else '한화 이글스 경기정보' }}</title>
    <meta property="og:type" content="website" />
    <meta property="og:title" content="{{ og.title if og else '한화 이글스 경기정보' }}" />
    <meta property="og:description" content="{{ og.description if og else '' }}" />
    <meta property="og:url" content="{{ og.url if og else '' }}" />
    <meta property="og:image" content="{{ og.image if og else '' }}" />
    <meta property="og:site_name" content="한화 이글스 경기 알림" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{ og.title if og else '한화 이글스 경기정보' }}" />
    <meta name="twitter:description" content="{{ og.description if og else '' }}" />
    <meta name="twitter:image" content="{{ og.image if og else '' }}" />
    <link rel="stylesheet" href="{{ url_for('styles') }}" />
</head>
<body>
    <main class="card">
        <h1>한화 이글스 경기정보</h1>
        <section id="game-content"></section>

        <div class="share-note">
            카카오톡 공유 URL:
            <a href="{{ og.url if og else '#' }}">{{ og.url if og else '' }}</a>
        </div>
    </main>

    <script>
        window.__NEXT_GAME__ = {{ game_info | tojson | safe }};
        window.__UPDATED_AT__ = "{{ updated_at if updated_at else '' }}";
    </script>
    <script src="{{ url_for('script') }}"></script>
</body>
</html>
